<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilha Sonora do Eder</title>
    <link rel="icon" type="image/png" href="imgs/archive_favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hidden { display: none !important; }
        :root {
            --accent-purple: #9b6dff;
            --accent-teal: #38bdf8;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: block;
            align-items: unset;
            justify-content: unset;
        }

        /* ===== HERO ===== */
        #hero {
            position: relative;
            text-align: center;
            padding: 80px 24px 60px;
            overflow: hidden;
        }

        #hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(207,170,86,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-title {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: var(--accent-gold);
            text-shadow: 0 0 40px rgba(207,170,86,0.4), 0 2px 8px rgba(0,0,0,0.8);
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        .hero-subtitle {
            font-family: var(--font-body);
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            max-width: 500px;
            margin: 0 auto 32px;
        }

        .hero-ornament {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            margin: 0 auto 40px;
        }

        /* ===== SEARCH BAR ===== */
        .search-wrap {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-primary);
            font-family: var(--font-body);
            padding: 12px 44px 12px 18px;
            border-radius: 99px;
            font-size: 0.9rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .search-wrap input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(207,170,86,0.15);
        }

        .search-wrap input::placeholder { color: #555; }

        .search-wrap .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 14px;
        }

        /* ===== TEMPORADA SECTION ===== */
        .temporada-section {
            position: relative;
            margin: 0;
            padding: 64px 24px 48px;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        .temporada-bg-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.18;
            transition: opacity 0.6s ease;
        }

        .temporada-section:hover .temporada-bg-layer {
            opacity: 0.25;
        }

        .temporada-color-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .temporada-top-fade {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(to bottom, var(--bg-color, #121213), transparent);
            pointer-events: none;
        }

        .temporada-bottom-fade {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(to top, var(--bg-color, #121213), transparent);
            pointer-events: none;
        }

        .temporada-inner {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
        }

        .temporada-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 36px;
        }

        .temporada-numero {
            font-family: var(--font-heading);
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent-gold);
            opacity: 0.35;
            line-height: 1;
            flex-shrink: 0;
            min-width: 60px;
        }

        .temporada-divider {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, var(--accent-gold), transparent);
            opacity: 0.4;
            flex-shrink: 0;
        }

        .temporada-info { flex: 1; }

        .temporada-nome {
            font-family: var(--font-heading);
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--text-primary);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .temporada-desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.6;
            max-width: 600px;
        }

        .temporada-count-badge {
            background: rgba(207,170,86,0.1);
            border: 1px solid rgba(207,170,86,0.25);
            color: var(--accent-gold);
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 4px 12px;
            border-radius: 99px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ===== MUSIC CARDS GRID ===== */
        .musicas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* ===== MUSIC CARD ===== */
        .musica-card {
            background: rgba(20, 20, 26, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.35s ease;
            display: flex;
            flex-direction: column;
            cursor: default;
        }

        .musica-card:hover {
            transform: translateY(-6px);
            border-color: rgba(207,170,86,0.25);
            box-shadow: 0 16px 40px rgba(0,0,0,0.7), 0 0 30px rgba(207,170,86,0.06);
        }

        /* Cover image */
        .musica-cover-wrap {
            position: relative;
            height: 160px;
            overflow: hidden;
            background: rgba(0,0,0,0.4);
        }

        .musica-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .musica-card:hover .musica-cover { transform: scale(1.07); }

        .musica-cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background: linear-gradient(135deg, #1a1a22, #0d0d12);
        }

        .musica-cover-gradient {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(to top, rgba(20,20,26,1), transparent);
        }

        /* Card body */
        .musica-body {
            padding: 18px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .musica-titulo {
            font-family: var(--font-heading);
            font-size: 1rem;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        .musica-artista {
            font-size: 0.78rem;
            color: var(--accent-gold);
            opacity: 0.8;
            margin-top: 2px;
        }

        /* Momento card */
        .momento-box {
            background: rgba(0,0,0,0.3);
            border-left: 2px solid var(--accent-gold);
            border-radius: 0 8px 8px 0;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.6;
            font-style: italic;
        }

        .momento-label {
            font-style: normal;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-gold);
            opacity: 0.7;
            margin-bottom: 5px;
            display: block;
        }

        /* Platform links */
        .musica-links {
            display: flex;
            gap: 8px;
            margin-top: auto;
            padding-top: 4px;
        }

        .platform-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.72rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid;
        }

        .platform-btn.youtube {
            background: rgba(255,0,0,0.1);
            border-color: rgba(255,0,0,0.3);
            color: #ff4444;
        }

        .platform-btn.youtube:hover {
            background: rgba(255,0,0,0.22);
            border-color: rgba(255,0,0,0.6);
            box-shadow: 0 0 12px rgba(255,0,0,0.2);
            transform: scale(1.05);
        }

        .platform-btn.spotify {
            background: rgba(30,215,96,0.1);
            border-color: rgba(30,215,96,0.3);
            color: #1ed760;
        }

        .platform-btn.spotify:hover {
            background: rgba(30,215,96,0.22);
            border-color: rgba(30,215,96,0.6);
            box-shadow: 0 0 12px rgba(30,215,96,0.2);
            transform: scale(1.05);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon { font-size: 3rem; opacity: 0.3; margin-bottom: 12px; }
        .empty-state p { font-size: 0.9rem; }

        /* ===== LOADER ===== */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
        }

        .spin-ring {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 3px solid rgba(207,170,86,0.2);
            border-top-color: var(--accent-gold);
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #loader p {
            font-family: var(--font-heading);
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ===== SEASON SEPARATOR ===== */
        .season-sep {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(207,170,86,0.2), transparent);
        }

        /* ===== NO RESULTS ===== */
        #noData {
            text-align: center;
            padding: 80px 20px;
        }

        #noData h2 {
            font-family: var(--font-heading);
            color: var(--text-secondary);
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        #noData p { color: #444; font-size: 0.85rem; }

        /* ===== BACK LINK ===== */
        #backLink {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            transition: color 0.2s;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 8px 14px;
            border-radius: 99px;
            backdrop-filter: blur(8px);
        }

        #backLink:hover { color: var(--accent-gold); border-color: rgba(207,170,86,0.3); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d0d12; }
        ::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

        /* Fade-in animation for sections */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .animate-in {
            animation: fadeInUp 0.6s ease forwards;
        }

        /* Hidden canvas for color extraction */
        #colorCanvas { display: none; }

        /* ===== MUSIC PLAYER ===== */
        #musicPlayer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 200;
            background: rgba(12, 12, 16, 0.97);
            border-top: 1px solid rgba(207,170,86,0.25);
            backdrop-filter: blur(24px);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 -8px 40px rgba(0,0,0,0.8);
        }

        #musicPlayer.active { transform: translateY(0); }

        .player-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .player-info { flex: 1; min-width: 0; }

        .player-song-title {
            font-family: var(--font-heading);
            font-size: 0.9rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-song-artist {
            font-size: 0.72rem;
            color: var(--accent-gold);
            opacity: 0.8;
            margin-top: 2px;
        }

        .player-platform-badge {
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 99px;
            border: 1px solid;
            flex-shrink: 0;
        }

        .player-platform-badge.yt {
            color: #ff4444;
            border-color: rgba(255,68,68,0.4);
            background: rgba(255,68,68,0.1);
        }

        .player-platform-badge.sp {
            color: #1ed760;
            border-color: rgba(30,215,96,0.4);
            background: rgba(30,215,96,0.1);
        }

        #playerToggleBtn {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #playerToggleBtn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

        #playerCloseBtn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        #playerCloseBtn:hover { color: #f87171; }

        .player-embed-area {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s ease;
        }

        .player-embed-area.expanded { max-height: 200px; }

        .player-embed-area iframe {
            width: 100%;
            border: none;
            display: block;
        }

        /* Play button on cards */
        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(207,170,86,0.12);
            border: 1px solid rgba(207,170,86,0.3);
            color: var(--accent-gold);
            padding: 5px 12px;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .play-btn:hover {
            background: rgba(207,170,86,0.25);
            border-color: var(--accent-gold);
            box-shadow: 0 0 12px rgba(207,170,86,0.2);
            transform: scale(1.04);
        }

        .play-btn.playing {
            filter: brightness(1.5);
            box-shadow: 0 0 14px currentColor;
        }

        .platform-btn.youtube.playing {
            background: rgba(255,0,0,0.3);
            border-color: #ff4444;
        }

        .platform-btn.spotify.playing {
            background: rgba(30,215,96,0.3);
            border-color: #1ed760;
        }

        /* ===== VIDEO MODAL (YouTube) ===== */
        #videoModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #videoModal.open { display: flex; }

        .video-modal-inner {
            width: 100%;
            max-width: 860px;
            background: #0d0d12;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0,0,0,0.9);
            animation: fadeInUp 0.3s ease;
        }

        .video-modal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .video-modal-title {
            font-family: var(--font-heading);
            color: var(--text-primary);
            font-size: 0.95rem;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-modal-artist {
            font-size: 0.75rem;
            color: var(--accent-gold);
            opacity: 0.8;
        }

        .video-modal-close {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px 11px;
            font-size: 1rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .video-modal-close:hover { background: rgba(248,113,113,0.15); border-color: #f87171; color: #f87171; }

        .video-modal-frame {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            background: #000;
        }
        .video-modal-frame iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<canvas id="colorCanvas" width="80" height="80"></canvas>

<a href="index.html" id="backLink">← Eder</a>

<!-- HERO -->
<section id="hero">
    <h1 class="hero-title">♪ Trilha Sonora do Eder</h1>
    <p class="hero-subtitle">As músicas que marcaram os momentos mais épicos da campanha</p>
    <div class="hero-ornament"></div>

    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Buscar música ou momento..." oninput="filterMusicas()">
        <span class="search-icon">🔍</span>
    </div>
</section>

<!-- LOADER -->
<div id="loader">
    <div class="spin-ring"></div>
    <p>Sintonizando os Registros Akáshicos...</p>
</div>

<!-- CONTENT -->
<div id="content" class="hidden"></div>

<!-- VIDEO MODAL (YouTube) -->
<div id="videoModal" onclick="handleModalBackdropClick(event)">
    <div class="video-modal-inner">
        <div class="video-modal-header">
            <div style="flex:1;min-width:0;">
                <div class="video-modal-title" id="modalTitle">—</div>
                <div class="video-modal-artist" id="modalArtist"></div>
            </div>
            <button class="video-modal-close" onclick="closeVideoModal()">✕</button>
        </div>
        <div class="video-modal-frame">
            <iframe id="videoModalIframe"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen></iframe>
        </div>
        <!-- Capa em destaque -->
        <div id="modalCoverWrap" style="display:none; position:relative; width:100%; height:220px; overflow:hidden;">
            <img id="modalCover" src="" alt=""
                style="width:100%; height:100%; object-fit:cover; display:block;">
            <div style="position:absolute; inset:0;
                        background:linear-gradient(to top, rgba(10,10,14,0.95) 0%, rgba(10,10,14,0.4) 50%, transparent 100%);
                        pointer-events:none;"></div>
            <!-- Botão expandir imagem -->
            <button onclick="openImageLightbox()" title="Ver imagem completa"
                style="position:absolute; top:10px; right:10px;
                       background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.18);
                       border-radius:7px; color:#e6e0d4; cursor:pointer;
                       width:34px; height:34px; display:flex; align-items:center; justify-content:center;
                       backdrop-filter:blur(6px); transition:all 0.2s; z-index:2;"
                onmouseover="this.style.background='rgba(207,170,86,0.25)';this.style.borderColor='rgba(207,170,86,0.6)'"
                onmouseout="this.style.background='rgba(0,0,0,0.55)';this.style.borderColor='rgba(255,255,255,0.18)'">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
            </button>
            <!-- Momento sobreposto no rodapé da imagem -->
            <div id="modalMomentoWrap" style="display:none; position:absolute; bottom:0; left:0; right:0; padding:18px 22px;">
                <span style="display:block; font-size:0.6rem; font-weight:bold; text-transform:uppercase;
                             letter-spacing:2px; color:var(--accent-gold); margin-bottom:6px;">♦ O Momento</span>
                <p id="modalMomento" style="font-size:0.88rem; color:#e6e0d4; line-height:1.65;
                                            font-style:italic; margin:0; text-shadow:0 1px 4px rgba(0,0,0,0.9);"></p>
            </div>
        </div>
        <!-- Momento sem imagem -->
        <div id="modalMomentoSolo" style="display:none; padding:18px 22px; border-top:1px solid rgba(255,255,255,0.06);">
            <span style="display:block; font-size:0.6rem; font-weight:bold; text-transform:uppercase;
                         letter-spacing:2px; color:var(--accent-gold); margin-bottom:8px;">♦ O Momento</span>
            <p id="modalMomentoSoloText" style="font-size:0.88rem; color:var(--text-secondary);
                                                line-height:1.7; font-style:italic; margin:0;"></p>
        </div>
    </div>
</div>

<!-- MUSIC PLAYER -->
<div id="musicPlayer">
    <div class="player-bar">
        <div class="player-info">
            <div class="player-song-title" id="playerTitle">—</div>
            <div class="player-song-artist" id="playerArtist"></div>
        </div>
        <span class="player-platform-badge" id="playerBadge"></span>
        <button id="playerToggleBtn" onclick="togglePlayerEmbed()">▼ Abrir</button>
        <button id="playerCloseBtn" onclick="closePlayer()" title="Fechar player">✕</button>
    </div>
    <div class="player-embed-area" id="playerEmbedArea">
        <iframe id="playerIframe" height="166" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe>
    </div>
</div>

<!-- NO DATA -->
<div id="noData" class="hidden">
    <h2>Silêncio...</h2>
    <p>Nenhuma trilha sonora foi registrada ainda.</p>
</div>

<script>
    const API_URL = "https://ac53afc98d.execute-api.sa-east-1.amazonaws.com/prod";

    let allTemporadas = [];
    let allMusicas = [];
    let currentPlayingId = null;
    let playerEmbedOpen = false;

    // ===== PLAYER =====
    function extractYouTubeId(url) {
        if (!url) return null;
        const match = url.match(/(?:v=|youtu\.be\/|embed\/)([^&?/\s]+)/);
        return match ? match[1] : null;
    }

    function extractSpotifyTrackId(url) {
        if (!url) return null;
        const match = url.match(/track\/([^?/\s]+)/);
        return match ? match[1] : null;
    }

    function playMusica(musicaId) {
        const musica = allMusicas.find(m => m.id === musicaId);
        if (!musica) return;

        const ytId = extractYouTubeId(musica.link_youtube);
        const spId = extractSpotifyTrackId(musica.link_spotify);
        if (!ytId && !spId) return;

        // Marca botão ativo
        document.querySelectorAll('.play-btn').forEach(btn => btn.classList.remove('playing'));
        const activeBtn = document.querySelector(`.play-btn[data-id="${musicaId}"]`);

        if (ytId) {
            // YouTube → modal overlay (evita bloqueio de autoplay do iframe)
            if (currentPlayingId === musicaId) {
                closeVideoModal();
                return;
            }
            currentPlayingId = musicaId;
            if (activeBtn) activeBtn.classList.add('playing');

            document.getElementById('modalTitle').textContent = musica.titulo || '—';
            document.getElementById('modalArtist').textContent = musica.artista || '';

            // Preencher capa e momento
            const hasCover  = musica.imagem_capa && musica.imagem_capa.trim();
            const hasMomento = musica.momento && musica.momento.trim();

            const coverWrap       = document.getElementById('modalCoverWrap');
            const cover           = document.getElementById('modalCover');
            const momentoWrap     = document.getElementById('modalMomentoWrap');
            const momento         = document.getElementById('modalMomento');
            const momentoSolo     = document.getElementById('modalMomentoSolo');
            const momentoSoloText = document.getElementById('modalMomentoSoloText');

            // Capa em destaque (banner full-width)
            if (hasCover) {
                cover.src = musica.imagem_capa;
                coverWrap.style.display = 'block';
                if (hasMomento) {
                    momento.textContent = musica.momento;
                    momentoWrap.style.display = 'block';
                } else {
                    momentoWrap.style.display = 'none';
                }
                momentoSolo.style.display = 'none';
            } else {
                coverWrap.style.display = 'none';
                if (hasMomento) {
                    momentoSoloText.textContent = musica.momento;
                    momentoSolo.style.display = 'block';
                } else {
                    momentoSolo.style.display = 'none';
                }
            }

            document.getElementById('videoModalIframe').src =
                `https://www.youtube-nocookie.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1`;
            document.getElementById('videoModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        } else {
            // Só Spotify → barra de baixo
            if (currentPlayingId === musicaId) {
                closePlayer();
                return;
            }
            currentPlayingId = musicaId;
            if (activeBtn) activeBtn.classList.add('playing');

            document.getElementById('playerTitle').textContent = musica.titulo || '—';
            document.getElementById('playerArtist').textContent = musica.artista || '';
            const iframe = document.getElementById('playerIframe');
            iframe.src = `https://open.spotify.com/embed/track/${spId}?utm_source=generator`;
            iframe.height = '152';
            document.getElementById('playerBadge').textContent = 'Spotify';
            document.getElementById('playerBadge').className = 'player-platform-badge sp';
            document.getElementById('musicPlayer').classList.add('active');
            openPlayerEmbed();
        }
    }

    function closeVideoModal() {
        document.getElementById('videoModal').classList.remove('open');
        document.getElementById('videoModalIframe').src = '';
        document.getElementById('modalCover').src = '';
        document.getElementById('modalCoverWrap').style.display = 'none';
        document.getElementById('modalMomentoSolo').style.display = 'none';
        document.body.style.overflow = '';
        document.querySelectorAll('.play-btn').forEach(btn => btn.classList.remove('playing'));
        currentPlayingId = null;
    }

    function handleModalBackdropClick(e) {
        if (e.target === document.getElementById('videoModal')) closeVideoModal();
    }

    // Fechar modal com ESC
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideoModal(); });

    function openPlayerEmbed() {
        const area = document.getElementById('playerEmbedArea');
        const btn = document.getElementById('playerToggleBtn');
        area.classList.add('expanded');
        btn.textContent = '▲ Fechar';
        playerEmbedOpen = true;
    }

    function togglePlayerEmbed() {
        const area = document.getElementById('playerEmbedArea');
        const btn = document.getElementById('playerToggleBtn');
        playerEmbedOpen = !playerEmbedOpen;
        area.classList.toggle('expanded', playerEmbedOpen);
        btn.textContent = playerEmbedOpen ? '▲ Fechar' : '▼ Abrir';
    }

    function closePlayer() {
        const player = document.getElementById('musicPlayer');
        const iframe = document.getElementById('playerIframe');
        const area = document.getElementById('playerEmbedArea');
        player.classList.remove('active');
        area.classList.remove('expanded');
        iframe.src = '';
        currentPlayingId = null;
        playerEmbedOpen = false;
        document.querySelectorAll('.play-btn').forEach(btn => btn.classList.remove('playing'));
        document.getElementById('playerToggleBtn').textContent = '▼ Abrir';
    }

    // ===== IMAGE LIGHTBOX =====
    function openImageLightbox() {
        const src = document.getElementById('modalCover').src;
        if (!src) return;

        const overlay = document.createElement('div');
        overlay.id = 'imageLightbox';
        overlay.style.cssText = `
            position:fixed; inset:0; z-index:10000;
            background:rgba(0,0,0,0.92);
            display:flex; align-items:center; justify-content:center;
            cursor:zoom-out; animation:fadeIn 0.18s ease;
        `;

        const img = document.createElement('img');
        img.src = src;
        img.style.cssText = `
            max-width:92vw; max-height:90vh;
            object-fit:contain; border-radius:8px;
            box-shadow:0 8px 60px rgba(0,0,0,0.8);
            cursor:default;
        `;
        img.onclick = e => e.stopPropagation();

        const closeBtn = document.createElement('button');
        closeBtn.textContent = '✕';
        closeBtn.style.cssText = `
            position:fixed; top:18px; right:22px;
            background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.2);
            color:#e6e0d4; font-size:1.2rem; width:40px; height:40px;
            border-radius:50%; cursor:pointer; display:flex;
            align-items:center; justify-content:center;
            backdrop-filter:blur(8px); transition:all 0.2s; z-index:1;
        `;
        closeBtn.onmouseover = () => { closeBtn.style.background = 'rgba(207,170,86,0.3)'; closeBtn.style.borderColor = 'rgba(207,170,86,0.6)'; };
        closeBtn.onmouseout  = () => { closeBtn.style.background = 'rgba(0,0,0,0.6)';       closeBtn.style.borderColor = 'rgba(255,255,255,0.2)'; };
        closeBtn.onclick = e => { e.stopPropagation(); closeLightbox(); };

        overlay.appendChild(img);
        overlay.appendChild(closeBtn);
        overlay.onclick = () => closeLightbox();
        document.body.appendChild(overlay);

        const escHandler = e => { if (e.key === 'Escape') { closeLightbox(); document.removeEventListener('keydown', escHandler); } };
        document.addEventListener('keydown', escHandler);

        function closeLightbox() {
            overlay.style.animation = 'fadeOut 0.15s ease forwards';
            setTimeout(() => overlay.remove(), 150);
        }
    }

    // ===== COLOR EXTRACTION =====
    function extractDominantColors(imageUrl) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';

            img.onload = () => {
                try {
                    const canvas = document.getElementById('colorCanvas');
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 80, 80);
                    const data = ctx.getImageData(0, 0, 80, 80).data;

                    const counts = {};
                    for (let i = 0; i < data.length; i += 4) {
                        const a = data[i + 3];
                        if (a < 128) continue;
                        // Quantize to reduce granularity
                        const r = Math.round(data[i] / 48) * 48;
                        const g = Math.round(data[i + 1] / 48) * 48;
                        const b = Math.round(data[i + 2] / 48) * 48;
                        // Skip near-black/near-white (not interesting)
                        const brightness = (r + g + b) / 3;
                        if (brightness < 20 || brightness > 220) continue;
                        const key = `${r},${g},${b}`;
                        counts[key] = (counts[key] || 0) + 1;
                    }

                    const sorted = Object.entries(counts)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 4)
                        .map(([k]) => k.split(',').map(Number));

                    resolve(sorted.length > 0 ? sorted : null);
                } catch (e) {
                    // CORS block or other error
                    resolve(null);
                }
            };

            img.onerror = () => resolve(null);
            img.src = imageUrl;
        });
    }

    function buildGradient(colors) {
        if (!colors || colors.length === 0) return null;

        const [r1, g1, b1] = colors[0];
        const [r2, g2, b2] = colors[1] || colors[0];
        const [r3, g3, b3] = colors[2] || colors[0];

        return `radial-gradient(ellipse at 20% 50%, rgba(${r1},${g1},${b1},0.28) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(${r2},${g2},${b2},0.22) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 90%, rgba(${r3},${g3},${b3},0.15) 0%, transparent 50%)`;
    }

    // ===== RENDER =====
    function sanitize(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function createMusicaCard(musica) {
        const hasCover = musica.imagem_capa && musica.imagem_capa.trim();
        const hasYT = musica.link_youtube && musica.link_youtube.trim();
        const hasSP = musica.link_spotify && musica.link_spotify.trim();

        const coverHtml = hasCover
            ? `<img class="musica-cover" src="${sanitize(musica.imagem_capa)}" alt="${sanitize(musica.titulo)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=musica-cover-placeholder>🎵</div><div class=musica-cover-gradient></div>'">`
            : `<div class="musica-cover-placeholder">🎵</div>`;

        // YouTube vira o botão de embed; Spotify fica como link externo
        const ytEmbedBtn = hasYT
            ? `<button class="platform-btn youtube play-btn" data-id="${sanitize(musica.id)}" onclick="playMusica('${sanitize(musica.id)}')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                YouTube
               </button>`
            : (hasSP
                ? `<button class="platform-btn spotify play-btn" data-id="${sanitize(musica.id)}" onclick="playMusica('${sanitize(musica.id)}')">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    Spotify
                   </button>`
                : '');

        const spLinkBtn = hasSP
            ? `<a class="platform-btn spotify" href="${sanitize(musica.link_spotify)}" target="_blank" rel="noopener" title="Abrir no Spotify">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 14.36a.62.62 0 0 1-.86.21c-2.36-1.44-5.33-1.77-8.83-.97a.62.62 0 1 1-.28-1.21c3.83-.87 7.1-.5 9.76 1.11a.62.62 0 0 1 .21.86zm1.24-2.76a.78.78 0 0 1-1.07.26c-2.7-1.66-6.81-2.14-10-.17a.78.78 0 1 1-.88-1.29c3.65-2.22 8.21-1.68 11.29.19a.78.78 0 0 1 .26 1.07zm.11-2.87c-3.24-1.92-8.59-2.1-11.68-.8a.94.94 0 1 1-.7-1.74c3.55-1.43 9.46-1.21 13.19.87a.94.94 0 0 1-1.11 1.53z"/></svg>
                ↗
               </a>`
            : '';

        const linksHtml = (hasYT || hasSP)
            ? `<div class="musica-links">${ytEmbedBtn}${spLinkBtn}</div>`
            : '';

        const div = document.createElement('div');
        div.className = 'musica-card';
        div.dataset.titulo = (musica.titulo || '').toLowerCase();
        div.dataset.artista = (musica.artista || '').toLowerCase();
        div.dataset.momento = (musica.momento || '').toLowerCase();
        div.dataset.temporadaId = musica.temporada_id || '';

        div.innerHTML = `
            <div class="musica-cover-wrap">
                ${coverHtml}
                <div class="musica-cover-gradient"></div>
            </div>
            <div class="musica-body">
                <div>
                    <div class="musica-titulo">${sanitize(musica.titulo)}</div>
                    ${musica.artista ? `<div class="musica-artista">${sanitize(musica.artista)}</div>` : ''}
                </div>
                ${musica.momento ? `
                <div class="momento-box">
                    <span class="momento-label">♦ O Momento</span>
                    ${sanitize(musica.momento)}
                </div>` : ''}
                ${linksHtml}
            </div>
        `;
        return div;
    }

    async function createTemporadaSection(temporada, musicas) {
        const section = document.createElement('section');
        section.className = 'temporada-section';
        section.id = `temp-${temporada.id}`;

        const sorted = [...musicas].sort((a, b) => (a.ordem || 999) - (b.ordem || 999));

        // Build section HTML
        const descHtml = temporada.descricao
            ? `<p class="temporada-desc">${sanitize(temporada.descricao)}</p>`
            : '';

        section.innerHTML = `
            <div class="temporada-bg-layer" ${temporada.imagem_bg ? `style="background-image: url('${sanitize(temporada.imagem_bg)}')"` : ''}></div>
            <div class="temporada-color-overlay"></div>
            <div class="temporada-top-fade"></div>
            <div class="temporada-bottom-fade"></div>
            <div class="temporada-inner">
                <div class="temporada-header">
                    <div class="temporada-numero">${String(temporada.numero || '').padStart(2, '0')}</div>
                    <div class="temporada-divider"></div>
                    <div class="temporada-info">
                        <div class="temporada-nome">${sanitize(temporada.nome)}</div>
                        ${descHtml}
                    </div>
                    <div class="temporada-count-badge">${sorted.length} ${sorted.length === 1 ? 'música' : 'músicas'}</div>
                </div>
                <div class="musicas-grid"></div>
            </div>
        `;

        const grid = section.querySelector('.musicas-grid');

        if (sorted.length === 0) {
            grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🎵</div><p>Nenhuma música registrada nesta temporada ainda.</p></div>`;
        } else {
            sorted.forEach(m => grid.appendChild(createMusicaCard(m)));
        }

        // Color extraction from background image
        if (temporada.imagem_bg && temporada.imagem_bg.trim()) {
            const colors = await extractDominantColors(temporada.imagem_bg);
            if (colors) {
                const gradient = buildGradient(colors);
                if (gradient) {
                    section.querySelector('.temporada-color-overlay').style.background = gradient;
                }
            }
        }

        return section;
    }

    async function renderContent() {
        const content = document.getElementById('content');
        content.innerHTML = '';

        const sortedTemporadas = [...allTemporadas].sort((a, b) => (a.numero || 0) - (b.numero || 0));

        if (sortedTemporadas.length === 0) {
            document.getElementById('noData').classList.remove('hidden');
            return;
        }

        for (let i = 0; i < sortedTemporadas.length; i++) {
            const temp = sortedTemporadas[i];
            const musicas = allMusicas.filter(m => m.temporada_id === temp.id);
            const section = await createTemporadaSection(temp, musicas);
            section.style.animationDelay = `${i * 0.1}s`;
            section.classList.add('animate-in');
            content.appendChild(section);

            if (i < sortedTemporadas.length - 1) {
                const sep = document.createElement('div');
                sep.className = 'season-sep';
                content.appendChild(sep);
            }
        }
    }

    // ===== SEARCH =====
    function filterMusicas() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        const cards = document.querySelectorAll('.musica-card');
        const sections = document.querySelectorAll('.temporada-section');

        cards.forEach(card => {
            const match = !q
                || card.dataset.titulo.includes(q)
                || card.dataset.artista.includes(q)
                || card.dataset.momento.includes(q);
            card.style.display = match ? '' : 'none';
        });

        // Hide sections with no visible cards
        sections.forEach(section => {
            const visibleCards = section.querySelectorAll('.musica-card:not([style*="display: none"])');
            section.style.display = visibleCards.length > 0 ? '' : 'none';
        });
    }

    // ===== LOAD =====
    async function loadData() {
        try {
            const res = await fetch(API_URL + '/', { method: 'GET' });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            allTemporadas = data.temporadas || [];
            allMusicas = data.musicas || [];
        } catch (e) {
            console.warn('API falhou, usando dados vazios:', e.message);
            allTemporadas = [];
            allMusicas = [];
        }

        document.getElementById('loader').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');

        await renderContent();
    }

    window.onload = loadData;
</script>
</body>
</html>
