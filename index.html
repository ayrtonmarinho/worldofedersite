<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>World Of Eder</title>
  </head>
  <body id="login_form">
    <i id="mode_icon" class="fa-solid fa-moon"></i>
    <header id="main-box">
      <div id="main">
        <img id="logo" src="imgs/woe_titulo.png" alt="World Of Eder" />
        <header id="titulo"><h1>Bem Vindo ao Eder</h1></header>
        <div id="login_box">
          <label class="loginbox" for="username">Usuário</label>
          <input type="text" name="user" id="username" placeholder="Seu nome de aventureiro...">
          
          <label class="loginbox" for="password">Senha</label>
          <input type="password" name="password" id="password" placeholder="Sua senha...">
          
          <a href="http://google.com" target="_blank">Esqueci a senha. Porra!</a>
          <button id="login_button" onclick="login()">Conectar</button>
          <span id="warning_login"></span>
        </div>
        <div style="margin-top: 24px; display: flex; flex-direction: column; gap: 10px; align-items: center;">
          <a href="trilha-sonora.html" style="display:inline-flex;align-items:center;gap:8px;color:var(--text-secondary,#9a9488);font-size:0.78rem;text-decoration:none;text-transform:uppercase;letter-spacing:1.5px;font-weight:bold;border:1px solid rgba(255,255,255,0.08);padding:8px 18px;border-radius:99px;backdrop-filter:blur(8px);background:rgba(0,0,0,0.3);transition:color 0.2s,border-color 0.2s;" onmouseover="this.style.color='#cfaa56';this.style.borderColor='rgba(207,170,86,0.4)'" onmouseout="this.style.color='';this.style.borderColor='rgba(255,255,255,0.08)'">♪ Trilha Sonora do Eder</a>
        </div>
      </div>
    </header>
    <script src="js/index.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
