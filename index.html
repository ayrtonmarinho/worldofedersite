<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>World Of Eder - Hub</title>
</head>
<body id="login_form">

  <!-- ═══════════════════════════════════════════
       TOP BAR — fixo no topo
  ═══════════════════════════════════════════ -->
  <div id="top-bar">
    <img src="imgs/woe_titulo.png" id="top-logo" alt="World of Eder" onerror="this.style.display='none'">
    <div id="user-badge" class="hidden"></div>
    <div id="top-bar-right">
      <i id="mode_icon" class="fa-solid fa-moon"></i>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       CONTEÚDO PRINCIPAL
  ═══════════════════════════════════════════ -->
  <main id="hub-main">

    <!-- LOGIN SECTION -->
    <section id="login-section">
      <div id="login-hero">
        <img id="logo" src="imgs/woe_titulo.png" alt="World of Eder" onerror="this.style.display='none'">
        <p>Entre com suas credenciais para acessar o Hub</p>
      </div>
      <div id="login_box">
        <div class="login-title">Entrar no Hub</div>
        <p class="loginbox">Nome de usuário</p>
        <input type="text"     id="username" placeholder="Seu nome" autocomplete="off">
        <p class="loginbox">Senha</p>
        <input type="password" id="password" placeholder="••••••••">
        <button id="login_button">
          <i class="fa-solid fa-right-to-bracket"></i> Entrar
        </button>
        <span id="warning_login"></span>
      </div>
    </section>

    <!-- LOBBY SECTION -->
    <section id="lobby-section" class="hidden">

      <div id="lobby-header">
        <div class="lobby-title-row">
          <h2 class="section-title">⚔ Lobby do Eder</h2>
          <!-- Admin: switch de visão -->
          <div id="view-switcher" class="hidden">
            <button class="view-btn active" data-view="admin">
              <i class="fa-solid fa-crown"></i> Admin
            </button>
            <button class="view-btn" data-view="mestre">
              <i class="fa-solid fa-chess-king"></i> Como Mestre
            </button>
            <button class="view-btn" data-view="jogador">
              <i class="fa-solid fa-dice-d20"></i> Como Jogador
            </button>
          </div>
        </div>
      </div>

      <div id="lobby-content">
        <div class="lobby-loading">
          <div class="mini-spinner"></div>
          <span>Carregando mesas...</span>
        </div>
      </div>

    </section>

    <!-- FERRAMENTAS RPG -->
    <section id="tools-section" class="hidden">
      <h2 class="section-title">Ferramentas RPG</h2>
      <div class="tools-grid">
        <button class="button-50" onclick="location.href='portasinfinitum.html'">Portas Infinitum</button>
        <button class="button-49" onclick="location.href='patchnotes.html'">Evento Ativo</button>
        <button class="button-49" onclick="location.href='soulslikehub.html'">Jormandurr</button>
        <button class="button-49" onclick="location.href='monsterCreator.html'">Criador de NPCs</button>
        <button class="button-49" onclick="location.href='poderesheroicos.html'">Poderes Heroicos</button>
        <button class="button-49" onclick="location.href='itemgeneratorz.html'">Item Generator</button>
        <button class="button-49" onclick="location.href='tools/dano_bonus.html'">Cálculo de Dano/Cura</button>
        <button class="button-49" onclick="location.href='WOE - Agenda.html'">Agenda</button>
      </div>
    </section>

  </main>

  <!-- Toast global -->
  <div id="hub-toast" class="hub-toast"></div>

  <!-- Modal container -->
  <div id="modal-root"></div>

  <script src="js/index.js"></script>
  <script src="js/hub.js"></script>
</body>
</html>
